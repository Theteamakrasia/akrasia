version: "3.9"

# Production-oriented compose
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    build:
      context: ./database
      dockerfile: ../infra/docker/db.Dockerfile
    env_file:
      - ./database/.env
    volumes:
      - db_data:/var/lib/data

volumes:
  db_data:
