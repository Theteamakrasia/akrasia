version: "3.9"

# ── Akrasia — Local Development Compose ─────────────────────
# Usage: docker-compose -f docker-compose.dev.yml up
services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       akrasia_db
      POSTGRES_USER:     akrasia_user
      POSTGRES_PASSWORD: devpassword
    volumes:
      - db_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akrasia_user -d akrasia_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_dev_data: