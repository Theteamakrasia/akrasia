version: "3.9"

# Development overrides — hot reload, exposed ports, verbose logging
services:
  frontend:
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NODE_ENV=development

  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

  db:
    ports:
      - "5432:5432"   # expose DB port locally for tools like TablePlus / DBeaver
