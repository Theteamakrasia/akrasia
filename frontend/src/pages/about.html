<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>Akrasia | About</title>
  <link rel="icon" href="../../public/favicon.ico" >
  <link rel="stylesheet" href="../css/main.css" >
</head>
<body>

  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="index.html" class="navbar__logo">Akrasia</a>
      <button type="button" class="navbar__hamburger" aria-label="Toggle menu" aria-expanded="false">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <ul class="navbar__links">
        <li><a href="index.html"   class="navbar__link">Home</a></li>
        <li><a href="about.html"   class="navbar__link active">About</a></li>
        <li><a href="contact.html" class="navbar__link">Contact</a></li>
        <li><a href="#" class="btn btn-primary btn-sm">Get Started</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section style="padding:var(--space-24) 0;background:var(--color-bg-alt);">
      <div class="container" style="max-width:700px;">
        <h1 style="margin-bottom:var(--space-4);">About Us</h1>
        <p>Tell your story here — who you are, why you built this, and what drives you.</p>
      </div>
    </section>

    <section style="padding:var(--space-24) 0;">
      <div class="container">
        <h2 style="text-align:center;margin-bottom:var(--space-12);">Meet the Team</h2>
        <div class="grid grid-3">
          <!-- Repeat this card per team member -->
          <div class="card" style="text-align:center;">
            <div style="width:80px;height:80px;border-radius:var(--radius-full);background:var(--color-surface);margin:0 auto var(--space-4);display:flex;align-items:center;justify-content:center;font-size:2rem;">👤</div>
            <h3 class="card__title">Team Member</h3>
            <p class="card__body">Role / Co-founder</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">&copy; <span id="year"></span> Akrasia. All rights reserved.</div>
    </div>
  </footer>

  <script type="module" src="../js/main.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
